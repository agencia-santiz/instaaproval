<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Instagram Aproval - Workflow de aprovação">
  <title>InstaAproval | Workspace</title>
  
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/instagram.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="gradient-text">InstaAproval</span>
      </div>
      
      <div class="sidebar-nav">
        <div class="nav-group">
          <div class="nav-group-title">Menu Principal</div>
          <a class="nav-link active" id="nav-feed"><i data-lucide="layout-grid"></i> Feed de Aprovações</a>
          <a class="nav-link" id="nav-calendario"><i data-lucide="calendar"></i> Calendário</a>
        </div>
        
        <div class="nav-group">
          <div class="nav-group-title">Meus Clientes</div>
          <div id="client-list">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-title">
          <h2 id="current-view-title" class="text-xl">Cliente: Brothers Filmes</h2>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="alert('Funcionalidade de upload em breve!')">
            <i data-lucide="plus"></i> Novo Post
          </button>
        </div>
      </header>

      <div class="content-area" id="main-content-area">
        <!-- Dashboard render area -->
      </div>
    </main>
  </div>

  <script src="js/mockData.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
